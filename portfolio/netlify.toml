# ============================================================
# Netlify Configuration — Portfolio (Frontend-Only SPA)
# ============================================================

[build]
  # Directory that contains the built site
  publish = "dist"
  # Build command
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# ── SPA Redirect ─────────────────────────────────────────────────────────────
# Redirect all routes to index.html so React Router handles navigation
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security Headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets aggressively ─────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
